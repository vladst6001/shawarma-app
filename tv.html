<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шаурма — Кухня</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}

    .mode-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:20px}
    .mode-title{font-size:24px;font-weight:800;margin-bottom:20px}
    .mode-btn{width:100%;max-width:300px;padding:20px;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer}
    .mode-btn:active{transform:scale(.96)}
    .m-cook{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
    .m-admin{background:linear-gradient(135deg,#374151,#1f2937);color:#fff}
    .m-tv{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}

    .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh;gap:1px;background:#222}
    .sidebar{background:#0a0a0a;padding:14px;display:flex;flex-direction:column;gap:6px}
    .sidebar h1{font-size:16px;font-weight:800;padding:6px 0;border-bottom:1px solid #222;margin-bottom:6px}
    .nav-btn{padding:10px 12px;border:none;border-radius:8px;background:#141414;color:#aaa;font-size:13px;font-weight:500;cursor:pointer;text-align:left;border:1px solid transparent}
    .nav-btn:hover{background:#1a1a1a;color:#fff}
    .nav-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
    .nav-sep{height:1px;background:#222;margin:4px 0}
    .printer-box{margin-top:auto;padding:10px;background:#141414;border-radius:8px;border:1px solid #222}
    .printer-row{display:flex;align-items:center;gap:6px}
    .printer-dot{width:8px;height:8px;border-radius:50%;background:#ff3b30}
    .printer-dot.on{background:#34c759}
    .printer-lbl{font-size:11px;flex:1;color:#888}
    .printer-sm{padding:4px 8px;border:none;border-radius:5px;background:#2563eb;color:#fff;font-size:10px;cursor:pointer}
    .auto-print{font-size:11px;color:#666;margin-top:4px;display:flex;align-items:center;gap:4px}

    .main{background:#0a0a0a;padding:16px;overflow-y:auto}
    .main h2{font-size:18px;font-weight:700;margin-bottom:12px}

    .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
    .cook-card{background:#141414;border:2px solid #222;border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;position:relative}
    .cook-card:hover{border-color:#444}
    .cook-card.sel{border-color:#2563eb}
    .cook-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .cook-num{font-size:18px;font-weight:800}
    .cook-time{margin-left:auto;font-size:10px;color:#555}
    .cook-user{font-size:10px;color:#666;margin-bottom:4px}
    .cook-items{font-size:11px;color:#aaa;line-height:1.4}
    .cook-items .cancelled{text-decoration:line-through;color:#555}
    .cook-acts{display:flex;gap:3px;margin-top:6px}
    .cook-act{flex:1;padding:6px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
    .cook-act.st{background:#1e3a5f;color:#60a5fa}
    .cook-act.it{background:#374151;color:#d1d5db}
    .cook-act.cn{background:#3b1a1a;color:#f87171}
    .cook-act.pr{background:#166534;color:#4ade80;font-size:10px}
    .badge{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:600;color:#fff}
    .badge-new{background:#3b82f6}.badge-accepted{background:#22c55e}.badge-cooking{background:#eab308;color:#000}.badge-ready{background:#166534}.badge-cancelled{background:#ef4444}
    .popup{position:absolute;bottom:0;left:0;right:0;background:#1a1a1a;border-radius:0 0 12px 12px;padding:6px;display:flex;gap:3px;z-index:10}
    .popup button{flex:1;padding:6px;border:none;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer}
    .p-acc{background:#166534;color:#fff}.p-cook{background:#92400e;color:#fbbf24}.p-done{background:#166534;color:#4ade80}.p-can{background:#7f1d1d;color:#fca5a5}

    .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .admin-section{background:#141414;border-radius:12px;padding:14px;border:1px solid #222}
    .admin-section h3{font-size:14px;font-weight:700;margin-bottom:8px}
    .admin-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#1a1a1a;border-radius:6px;margin-bottom:4px;font-size:12px}
    .admin-row .acts button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px}
    .admin-input,.admin-select{width:100%;padding:6px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:12px;margin-bottom:4px}
    .admin-add{width:100%;padding:6px;border:none;border-radius:5px;background:#2563eb;color:#fff;font-weight:600;font-size:12px;cursor:pointer}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px;border-bottom:1px solid #222;font-size:12px}
    .setting-edit{background:none;border:1px solid #333;border-radius:4px;color:#888;padding:2px 6px;font-size:10px;cursor:pointer}
    .admin-test{width:100%;padding:8px;border:none;border-radius:6px;background:#16a34a;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}

    .tv-full{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#222}
    .tv-col{background:#0a0a0a;padding:16px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
    .tv-title{font-size:24px;font-weight:900;text-align:center;padding:12px;border-radius:12px}
    .tv-title.pending{background:#1e3a5f;color:#60a5fa}
    .tv-title.ready{background:#166534;color:#4ade80}
    .tv-card{background:#111;border-radius:12px;padding:20px;text-align:center;border:3px solid #333}
    .tv-card.new{border-color:#3b82f6}.tv-card.accepted{border-color:#22c55e}.tv-card.cooking{border-color:#eab308}
    .tv-card.ready{border-color:#166534}.tv-card.ready .tv-num{text-decoration:line-through;opacity:.5}
    .tv-num{font-family:'Courier New',monospace;font-size:64px;font-weight:900;color:#fff}
    .tv-items{font-size:16px;color:#aaa;margin-top:8px}
    .tv-time{font-size:12px;color:#444;margin-top:4px}
    .tv-empty{text-align:center;padding:50px;color:#333;font-size:18px}
    .tv-exit{position:fixed;top:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;z-index:100}

    .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-box{background:#1a1a1a;border-radius:12px;padding:18px;width:100%;max-width:340px}
    .modal-box h3{margin-bottom:12px;font-size:16px}
    .modal-box input,.modal-box select{width:100%;padding:8px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;font-size:13px;margin-bottom:8px}
    .modal-btns{display:flex;gap:6px}
    .modal-btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
    .m-cancel{background:#333;color:#888}.m-ok{background:#2563eb;color:#fff}.m-danger{background:#dc2626;color:#fff}
    @media(max-width:700px){.layout{grid-template-columns:1fr}.admin-grid{grid-template-columns:1fr}.tv-full{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
var ADMIN_CODE='458307pP';
var MENU=[
  {id:1,name:'Шаурма классическая',desc:'Курица, овощи, соус',cat:'shawarma'},
  {id:2,name:'Шаурма с говядиной',desc:'Говядина, овощи, соус',cat:'shawarma'},
  {id:3,name:'Шаурма острый цыпленок',desc:'Острый соус, курица',cat:'shawarma'},
  {id:4,name:'Шаурма веганская',desc:'Овощи, хумус',cat:'shawarma'},
  {id:5,name:'Чипсы из лаваша',desc:'Хрустящие чипсы',cat:'snacks'},
  {id:6,name:'Сырные палочки',desc:'6 шт',cat:'snacks'},
  {id:7,name:'Крылышки BBQ',desc:'4 шт',cat:'snacks'},
  {id:8,name:'Кола 0.5л',desc:'',cat:'drinks'},
  {id:9,name:'Сок яблочный',desc:'0.3л',cat:'drinks'},
  {id:10,name:'Молочный коктейль',desc:'Клубничный',cat:'drinks'},
  {id:11,name:'Макароны с сыром',desc:'Домашние',cat:'hot'},
  {id:12,name:'Картофель фри',desc:'Порция',cat:'hot'}
];

var S={mode:null,view:'cook',sel:null,showSt:false,showIt:false,shopName:'ШАУРМА №1',_modal:null,autoPrint:true};
var orders=JSON.parse(localStorage.getItem('sw_orders')||'[]');
var nid=parseInt(localStorage.getItem('sw_nid')||'100');
S.shopName=localStorage.getItem('yhk_shop')||'ШАУРМА №1';
function save(){localStorage.setItem('sw_orders',JSON.stringify(orders));localStorage.setItem('sw_nid',String(nid));}

var PSVC='49535343-fe7d-4ae5-8fa9-9fafd205e455',PTX='49535343-8841-43f4-a8d4-ecbe34729bb3',PW=384,PC=100,PCD=20,PLD=8,PID=150,PTH=200;
var pD=null,pT=null;
function pS(m){return new Promise(function(r){setTimeout(r,m)})}
async function pSend(d){for(var o=0;o<d.length;o+=PC){var e=Math.min(o+PC,d.length);await pT.writeValueWithoutResponse(d.slice(o,e));if(o+PC<d.length)await pS(PCD);}}
async function pConnect(){if(!navigator.bluetooth)return false;try{var d=await navigator.bluetooth.requestDevice({filters:[{services:[PSVC]}]});var g=await d.gatt.connect();var s=await g.getPrimaryService(PSVC);pT=await s.getCharacteristic(PTX);d.addEventListener('gattserverdisconnected',function(){pD=null;pT=null;render()});pD=d;return true;}catch(e){return false;}}
function pDisconnect(){if(pD&&pD.gatt.connected)pD.gatt.disconnect();pD=null;pT=null;render();}

function printReceipt(order){
  if(!pD||!pD.gatt.connected)return;
  var sep='================================\n';
  var text=S.shopName+'\n\n'+sep+'ЗАКАЗ #'+order.id+'\n\n'+order.items.filter(function(i){return!i.cancelled}).map(function(i){return i.qty+'x '+i.name}).join('\n')+'\n\n'+sep+new Date().toLocaleDateString('ru-RU')+' '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})+'\n'+sep;
  var fs=24,pl=4,ls=text.split('\n'),lh=Math.round(fs*1.25);
  var cv=document.createElement('canvas');cv.width=PW;cv.height=ls.length*lh+20;
  var cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,PW,cv.height);cx.fillStyle='#000';cx.font=fs+'px monospace';cx.textBaseline='top';
  ls.forEach(function(l,i){cx.fillText(l,pl,i*lh+4)});
  var id=cx.getImageData(0,0,PW,cv.height),wb=PW/8,tl=cv.height;
  (async function(){try{await pSend(new Uint8Array([0x1b,0x40]));await pS(PID);for(var y=0;y<tl;y++){var ln=new Uint8Array(wb);for(var bi=0;bi<wb;bi++){var b=0;for(var bit=0;bit<8;bit++){var x=bi*8+bit;if(x>=PW)continue;var gi=(y*PW+x)*4;if(id.data[gi]*0.299+id.data[gi+1]*0.587+id.data[gi+2]*0.114<PTH)b|=0x80>>bit;}ln[bi]=b;}var hdr=new Uint8Array([0x1d,0x76,0x30,0x00,wb&0xff,(wb>>8)&0xff,0x01,0x00]);var pk=new Uint8Array(hdr.length+ln.length);pk.set(hdr);pk.set(ln,hdr.length);await pSend(pk);await pS(PLD);}var fd=new Uint8Array(2);fd.fill(0x0a);await pSend(fd);showToast('✅ Чек #'+order.id,'success');}catch(e){showToast('❌ '+e.message,'error');}})();
}

function showToast(m,t,d){t=t||'info';d=d||3000;var el=document.createElement('div');el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;transition:opacity .3s;max-width:90vw;text-align:center';var c={info:'#1e40af',success:'#166534',error:'#991b1b'};el.style.background=c[t];el.style.color='#fff';el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.remove()},300)},d);}

function render(){
  var r=document.getElementById('root');
  if(!S.mode){r.innerHTML=modeSelect();return;}
  if(S.view==='tv'||S.mode==='tv'){r.innerHTML=tvFull();return;}
  var h='<div class="layout">';
  h+='<div class="sidebar"><h1>🍽 Шаурма</h1>';
  h+='<button class="nav-btn'+(S.view==='cook'?' active':'')+'" onclick="S.view=\'cook\';S.sel=null;render()">👨‍🍳 Повар</button>';
  h+='<button class="nav-btn'+(S.view==='admin'?' active':'')+'" onclick="S.view=\'admin\';render()">⚙️ Админ</button>';
  h+='<div class="nav-sep"></div>';
  h+='<button class="nav-btn" onclick="S.view=\'tv\';render()">📺 Табло</button>';
  h+='<div class="printer-box"><div class="printer-row"><div class="printer-dot'+(pD?' on':'')+'"></div><span class="printer-lbl">'+(pD?(pD.name||'Принтер'):'Нет')+'</span>';
  h+=pD?'<button class="printer-sm" onclick="pDisconnect()">Откл</button>':'<button class="printer-sm" onclick="pConnect().then(render)">Подкл</button>';
  h+='</div><label class="auto-print"><input type="checkbox"'+(S.autoPrint?' checked':'')+' onchange="S.autoPrint=this.checked"> Автопечать</label></div></div>';
  h+='<div class="main">';
  if(S.view==='cook')h+=cookPanel();
  else if(S.view==='admin')h+=adminPanel();
  h+='</div></div>'+renderModal();
  r.innerHTML=h;
}

function modeSelect(){
  return'<div class="mode-screen"><div class="mode-title">🍽 Кухня</div>'+
    '<button class="mode-btn m-cook" onclick="S.mode=\'cook\';S.view=\'cook\';render()">👨‍🍳 Повар</button>'+
    '<button class="mode-btn m-admin" onclick="S.mode=\'admin\';S.view=\'admin\';render()">⚙️ Админ</button>'+
    '<button class="mode-btn m-tv" onclick="S.mode=\'tv\';S.view=\'tv\';render()">📺 Табло</button></div>';
}

function cookPanel(){
  var h='<h2>👨‍🍳 Заказы</h2>';
  var active=orders.filter(function(o){return o.status!=='ready'&&o.status!=='cancelled'});
  if(!active.length)h+='<div style="padding:50px 0;color:#444;text-align:center">Нет активных заказов</div>';
  else{h+='<div class="orders-grid">';
  active.forEach(function(o){
    var sel=S.sel===o.id;
    h+='<div class="cook-card'+(sel?' sel':'')+'" onclick="toggleSel('+o.id+')" style="position:relative">';
    h+='<div class="cook-hdr"><span class="cook-num">#'+o.id+'</span><span class="badge badge-'+o.status+'">'+({new:'Новый',accepted:'Принят',cooking:'Готовится'})[o.status]+'</span><span class="cook-time">'+o.time+'</span></div>';
    h+='<div class="cook-user">'+o.user+'</div>';
    o.items.forEach(function(it){h+='<div class="cook-items'+(it.cancelled?' cancelled':'')+'">'+it.qty+'x '+it.name+(it.cancelled?' ❌':'')+'</div>';});
    if(pD)h+='<button class="cook-act pr" style="margin-top:4px" onclick="event.stopPropagation();printReceipt(orders.find(function(x){return x.id==='+o.id+'}))">🖨</button>';
    if(sel){h+='<div class="cook-acts"><button class="cook-act st" onclick="event.stopPropagation();S.showSt=!S.showSt;S.showIt=false;render()">Статус</button><button class="cook-act it" onclick="event.stopPropagation();S.showIt=!S.showIt;S.showSt=false;render()">Позиции</button><button class="cook-act cn" onclick="event.stopPropagation();cancelO('+o.id+')">✕</button></div>';}
    if(sel&&S.showSt){h+='<div class="popup"><button class="p-acc" onclick="event.stopPropagation();setSt('+o.id+',\'accepted\')">🟢 Принять</button><button class="p-cook" onclick="event.stopPropagation();setSt('+o.id+',\'cooking\')">🟡 Готовится</button><button class="p-done" onclick="event.stopPropagation();setSt('+o.id+',\'ready\');autoP('+o.id+')">✅ Готово</button><button class="p-can" onclick="event.stopPropagation();cancelO('+o.id+')">Отмена</button></div>';}
    if(sel&&S.showIt){h+='<div style="position:absolute;bottom:0;left:0;right:0;background:#1a1a1a;border-radius:0 0 12px 12px;padding:6px;z-index:10">';o.items.forEach(function(it,idx){if(!it.cancelled)h+='<div style="display:flex;justify-content:space-between;padding:4px;border-bottom:1px solid #333;font-size:11px"><span>'+it.qty+'x '+it.name+'</span><button style="background:none;border:none;color:#f87171;cursor:pointer" onclick="event.stopPropagation();cancelI('+o.id+','+idx+')">✕</button></div>';});h+='</div>';}
    h+='</div>';});h+='</div>';}
  return h;
}

function adminPanel(){
  var h='<h2>⚙️ Админ</h2><div class="admin-grid">';
  h+='<div class="admin-section"><h3>📋 Меню</h3>';
  MENU.forEach(function(it,i){h+='<div class="admin-row"><span>'+it.name+' <small style="color:#666">('+it.cat+')</small></span><div class="acts"><button onclick="editMI('+i+')">✏️</button><button onclick="delMI('+i+')">🗑</button></div></div>';});
  h+='<input class="admin-input" id="newName" placeholder="Название"><select class="admin-select" id="newCat"><option value="shawarma">🌯 Шаурма</option><option value="snacks">🍟 Закуски</option><option value="drinks">🥤 Напитки</option><option value="hot">🍝 Горячее</option></select><button class="admin-add" onclick="addMI()">+ Добавить</button></div>';
  h+='<div class="admin-section"><h3>⚙️ Настройки</h3>';
  h+='<div class="setting-row"><span>🏪 Название</span><span>'+S.shopName+'</span><button class="setting-edit" onclick="editShop()">Изм.</button></div>';
  h+='<div class="setting-row"><span>🔤 Шрифт</span><span>'+(localStorage.getItem('yhk_font')||'24')+'px</span><button class="setting-edit" onclick="editSet(\'yhk_font\',\'Шрифт\',\'24\')">Изм.</button></div>';
  h+='<div class="setting-row"><span>↔️ Отступ</span><span>'+(localStorage.getItem('yhk_pad')||'4')+'px</span><button class="setting-edit" onclick="editSet(\'yhk_pad\',\'Отступ\',\'4\')">Изм.</button></div>';
  h+='<div class="setting-row"><span>↕️ Позиции</span><span>'+(localStorage.getItem('yhk_igap')||'1')+'</span><button class="setting-edit" onclick="editSet(\'yhk_igap\',\'Позиции\',\'1\')">Изм.</button></div>';
  h+='</div>';
  h+='<div class="admin-section" style="grid-column:span 2"><h3>🖨 Тест</h3><button class="admin-test" onclick="printTest()">Напечатать тестовый чек</button>'+(pD?'':'<div style="color:#666;font-size:11px;margin-top:4px;text-align:center">Подключите принтер</div>')+'</div></div>';
  return h;
}

function tvFull(){
  var pending=orders.filter(function(o){return o.status!=='ready'&&o.status!=='cancelled'});
  var ready=orders.filter(function(o){return o.status==='ready'});
  var h='<button class="tv-exit" onclick="S.view=\''+(S.mode==='tv'?'tv':'cook')+'\';render()">← Назад</button>';
  h+='<div class="tv-full"><div class="tv-col"><div class="tv-title pending">ГОТОВЯТСЯ ('+pending.length+')</div>';
  if(!pending.length)h+='<div class="tv-empty">Пусто</div>';
  pending.forEach(function(o){h+='<div class="tv-card '+o.status+'"><div class="tv-num">#'+o.id+'</div><div class="tv-items">'+o.items.filter(function(i){return!i.cancelled}).map(function(i){return i.qty+'x '+i.name}).join(', ')+'</div><div class="tv-time">'+o.time+'</div></div>';});
  h+='</div><div class="tv-col"><div class="tv-title ready">ГОТОВО ('+ready.length+')</div>';
  if(!ready.length)h+='<div class="tv-empty">Пусто</div>';
  ready.forEach(function(o){h+='<div class="tv-card ready"><div class="tv-num">#'+o.id+'</div><div class="tv-items">'+o.items.filter(function(i){return!i.cancelled}).map(function(i){return i.qty+'x '+i.name}).join(', ')+'</div></div>';});
  h+='</div></div>';return h;
}

function renderModal(){
  var m=S._modal;if(!m)return'';
  var h='<div class="modal-bg" onclick="S._modal=null;render()"><div class="modal-box" onclick="event.stopPropagation()">';
  if(m.type==='editItem'){h+='<h3>Редактировать</h3><input id="m_name" value="'+m.name+'"><div class="modal-btns"><button class="m-cancel" onclick="S._modal=null;render()">Отмена</button><button class="m-ok" onclick="confirmModal()">OK</button></div>';}
  else if(m.type==='delItem'){h+='<h3>Удалить «'+m.name+'»?</h3><div class="modal-btns"><button class="m-cancel" onclick="S._modal=null;render()">Нет</button><button class="m-danger" onclick="confirmModal()">Удалить</button></div>';}
  else if(m.type==='cancelOrder'){h+='<h3>Отмена #'+m.id+'</h3><input id="m_reason" placeholder="Причина..."><div class="modal-btns"><button class="m-cancel" onclick="S._modal=null;render()">Отмена</button><button class="m-danger" onclick="confirmModal()">Подтвердить</button></div>';}
  else if(m.type==='cancelItem'){h+='<h3>Отмена позиции</h3><input id="m_reason" placeholder="Причина..."><div class="modal-btns"><button class="m-cancel" onclick="S._modal=null;render()">Отмена</button><button class="m-danger" onclick="confirmModal()">Подтвердить</button></div>';}
  else if(m.type==='setting'){h+='<h3>'+m.label+'</h3><input id="m_val" value="'+m.val+'"><div class="modal-btns"><button class="m-cancel" onclick="S._modal=null;render()">Отмена</button><button class="m-ok" onclick="confirmModal()">Сохранить</button></div>';}
  h+='</div></div>';return h;
}

function confirmModal(){var m=S._modal;if(!m)return;
  if(m.type==='editItem'){var n=document.getElementById('m_name').value;if(n.trim())MENU[m.idx].name=n.trim();}
  else if(m.type==='delItem')MENU.splice(m.idx,1);
  else if(m.type==='cancelOrder'){var o=orders.find(function(x){return x.id===m.id});if(o)o.status='cancelled';}
  else if(m.type==='cancelItem'){var r=document.getElementById('m_reason').value;var o=orders.find(function(x){return x.id===m.oi});if(o&&o.items[m.idx]){o.items[m.idx].cancelled=true;o.items[m.idx].reason=r;}}
  else if(m.type==='setting'){var v=document.getElementById('m_val').value;localStorage.setItem(m.key,v);if(m.key==='yhk_shop')S.shopName=v;}
  S._modal=null;save();render();
}

function toggleSel(id){S.sel=S.sel===id?null:id;S.showSt=false;S.showIt=false;render();}
function setSt(id,st){var o=orders.find(function(x){return x.id===id});if(o)o.status=st;S.showSt=false;save();render();showToast('Готово','success');}
function cancelO(id){S._modal={type:'cancelOrder',id:id};render();}
function cancelI(oi,idx){S._modal={type:'cancelItem',oi:oi,idx:idx};render();}
function addMI(){var n=document.getElementById('newName').value;var c=document.getElementById('newCat').value;if(n.trim()){MENU.push({id:MENU.length+1,name:n.trim(),desc:'',cat:c});document.getElementById('newName').value='';render();}}
function editMI(i){S._modal={type:'editItem',idx:i,name:MENU[i].name};render();}
function delMI(i){S._modal={type:'delItem',idx:i,name:MENU[i].name};render();}
function editShop(){S._modal={type:'setting',key:'yhk_shop',label:'Название',val:S.shopName};render();}
function editSet(k,l,d){S._modal={type:'setting',key:k,label:l,val:localStorage.getItem(k)||d};render();}
function autoP(id){if(S.autoPrint&&pD&&pD.gatt.connected){var o=orders.find(function(x){return x.id===id});if(o)printReceipt(o);}}

function printTest(){
  if(!pD||!pD.gatt.connected){showToast('Принтер не подключён','error');return;}
  var text=S.shopName+'\n\n================================\nТЕСТОВЫЙ ЧЕК\n\n================================\n1x Тест 1\n1x Тест 2\n\n================================\n'+new Date().toLocaleDateString('ru-RU')+' '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})+'\n================================\n';
  var fs=24,pl=4,ls=text.split('\n'),lh=Math.round(fs*1.25);
  var cv=document.createElement('canvas');cv.width=PW;cv.height=ls.length*lh+20;var cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,PW,cv.height);cx.fillStyle='#000';cx.font=fs+'px monospace';cx.textBaseline='top';ls.forEach(function(l,i){cx.fillText(l,pl,i*lh+4)});
  var id2=cx.getImageData(0,0,PW,cv.height),wb=PW/8,tl=cv.height;
  (async function(){try{await pSend(new Uint8Array([0x1b,0x40]));await pS(PID);for(var y=0;y<tl;y++){var ln=new Uint8Array(wb);for(var bi=0;bi<wb;bi++){var b=0;for(var bit=0;bit<8;bit++){var x=bi*8+bit;if(x>=PW)continue;var gi=(y*PW+x)*4;if(id2.data[gi]*0.299+id2.data[gi+1]*0.587+id2.data[gi+2]*0.114<PTH)b|=0x80>>bit;}ln[bi]=b;}var hdr=new Uint8Array([0x1d,0x76,0x30,0x00,wb&0xff,(wb>>8)&0xff,0x01,0x00]);var pk=new Uint8Array(hdr.length+ln.length);pk.set(hdr);pk.set(ln,hdr.length);await pSend(pk);await pS(PLD);}var fd=new Uint8Array(2);fd.fill(0x0a);await pSend(fd);showToast('✅ Напечатано','success');}catch(e){showToast('❌ '+e.message,'error');}})();
}

if(location.hash==='#tv'){S.mode='tv';S.view='tv';}
setInterval(function(){var nv=JSON.parse(localStorage.getItem('sw_orders')||'[]');if(JSON.stringify(nv)!==JSON.stringify(orders)){orders=nv;render();}},2000);
render();
</script>
